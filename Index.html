<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Knife Shop Tracker</title>
  <style>
    :root{
      --bg:#111315;
      --panel:#1a1d21;
      --panel-2:#22262b;
      --line:#31363d;
      --text:#f3f4f6;
      --muted:#a7adb7;
      --accent:#d4a35f;
      --danger:#b44b4b;
      --ok:#4f8a63;
      --shadow:0 10px 30px rgba(0,0,0,.28);
      --radius:18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:linear-gradient(180deg,#0d0f11 0%, #14171a 100%);
      color:var(--text);
      min-height:100vh;
    }
    .wrap{
      max-width:1100px;
      margin:0 auto;
      padding:16px;
    }
    .hero, .card{
      background:rgba(26,29,33,.96);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
    }
    .hero{
      padding:18px;
      margin-bottom:16px;
    }
    .title{
      font-size:28px;
      font-weight:700;
      margin:0 0 6px 0;
      letter-spacing:.2px;
    }
    .subtitle{
      color:var(--muted);
      font-size:14px;
      line-height:1.4;
    }
    .stats{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:10px;
      margin-top:14px;
    }
    .stat{
      background:var(--panel-2);
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px;
    }
    .stat .k{
      color:var(--muted);
      font-size:12px;
      margin-bottom:4px;
    }
    .stat .v{
      font-size:24px;
      font-weight:700;
    }
    .grid{
      display:grid;
      grid-template-columns:360px 1fr;
      gap:16px;
    }
    .card{
      padding:14px;
    }
    .section-title{
      font-size:18px;
      font-weight:700;
      margin:0 0 12px 0;
    }
    .muted{ color:var(--muted); }
    .field, .select, .textarea, .search{
      width:100%;
      padding:12px 13px;
      margin-top:8px;
      border-radius:12px;
      border:1px solid var(--line);
      background:#101214;
      color:var(--text);
      outline:none;
    }
    .textarea{
      min-height:96px;
      resize:vertical;
    }
    .btn{
      border:1px solid var(--line);
      background:var(--panel-2);
      color:var(--text);
      padding:11px 14px;
      border-radius:12px;
      cursor:pointer;
      font-weight:600;
    }
    .btn.primary{
      background:var(--accent);
      color:#1a1208;
      border-color:#b98a46;
    }
    .btn.danger{
      background:var(--danger);
      border-color:#9f4141;
    }
    .btn.ghost{
      background:transparent;
    }
    .row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
    }
    .row3{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:8px;
    }
    .project-list{
      max-height:70vh;
      overflow:auto;
      padding-right:4px;
    }
    .project-item{
      background:var(--panel-2);
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px;
      margin-bottom:10px;
      cursor:pointer;
    }
    .project-item.active{
      outline:2px solid var(--accent);
      background:#262a30;
    }
    .project-top{
      display:flex;
      justify-content:space-between;
      gap:8px;
      align-items:flex-start;
    }
    .project-name{
      font-weight:700;
      margin-bottom:4px;
    }
    .badge{
      font-size:12px;
      padding:5px 8px;
      border-radius:999px;
      display:inline-block;
      border:1px solid var(--line);
      background:#121417;
      color:var(--muted);
      white-space:nowrap;
    }
    .badge.high{ color:#ffd9d9; background:#3b2020; border-color:#6f3838; }
    .badge.ok{ color:#d6f0df; background:#21352a; border-color:#355743; }
    .small{
      font-size:12px;
      color:var(--muted);
      margin-top:6px;
    }
    .progress{
      height:8px;
      background:#0f1113;
      border:1px solid var(--line);
      border-radius:999px;
      overflow:hidden;
      margin-top:8px;
    }
    .bar{
      height:100%;
      background:linear-gradient(90deg,#d4a35f,#e8c07b);
      width:0%;
    }
    .main-header{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      margin-bottom:12px;
    }
    .main-title{
      font-size:24px;
      font-weight:700;
      margin-bottom:4px;
    }
    .pills{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:8px;
    }
    .stage-grid{
      display:grid;
      grid-template-columns:repeat(2, 1fr);
      gap:10px;
      margin-top:12px;
    }
    .stage-card{
      background:var(--panel-2);
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px;
    }
    .stage-card.current{
      outline:2px solid var(--accent);
    }
    .stage-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:8px;
      margin-bottom:10px;
    }
    .stage-name{
      font-weight:700;
    }
    .check{
      display:flex;
      align-items:flex-start;
      gap:10px;
      background:#171a1e;
      border:1px solid #2b3037;
      border-radius:12px;
      padding:10px;
      margin-top:8px;
    }
    .check input{
      margin-top:2px;
      width:18px;
      height:18px;
      flex:0 0 auto;
      accent-color:#d4a35f;
    }
    .actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:12px;
    }
    .empty{
      text-align:center;
      color:var(--muted);
      padding:48px 20px;
      border:1px dashed var(--line);
      border-radius:16px;
      background:rgba(255,255,255,.02);
    }
    .footer-note{
      margin-top:12px;
      color:var(--muted);
      font-size:12px;
    }
    @media (max-width: 900px){
      .grid{ grid-template-columns:1fr; }
      .stats{ grid-template-columns:repeat(2,1fr); }
      .stage-grid{ grid-template-columns:1fr; }
      .row3{ grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div class="title">Knife Shop Tracker</div>
      <div class="subtitle">Track multiple builds, jump to whatever phase fits your mood, and stop relying on memory like it has ever once deserved that trust.</div>
      <div class="stats">
        <div class="stat"><div class="k">Projects</div><div class="v" id="statProjects">0</div></div>
        <div class="stat"><div class="k">High Priority</div><div class="v" id="statHigh">0</div></div>
        <div class="stat"><div class="k">Completed</div><div class="v" id="statDone">0</div></div>
        <div class="stat"><div class="k">Active Stage</div><div class="v" id="statActive">—</div></div>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <div class="section-title">New Project</div>
        <input id="name" class="field" placeholder="Project name">
        <input id="steel" class="field" placeholder="Steel">
        <input id="handle" class="field" placeholder="Handle material">
        <input id="bladeType" class="field" placeholder="Blade type">
        <div class="row">
          <select id="priority" class="select">
            <option value="Normal">Normal priority</option>
            <option value="High">High priority</option>
            <option value="Low">Low priority</option>
          </select>
          <select id="status" class="select">
            <option value="Active">Active</option>
            <option value="On Hold">On Hold</option>
            <option value="Waiting">Waiting</option>
            <option value="Complete">Complete</option>
          </select>
        </div>
        <button id="addBtn" class="btn primary" type="button">Add Project</button>

        <div class="section-title" style="margin-top:18px;">Projects</div>
        <input id="search" class="search" placeholder="Search projects...">
        <div class="project-list" id="projectList"></div>
      </div>

      <div class="card">
        <div id="mainPane"></div>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "knife-shop-tracker-v2";
    const STAGES = ["Design","Material","Profiling","Grinding","Heat Treat","Handle","Finish","Complete"];
    const CHECKLISTS = {
      "Design": ["Profile chosen","Steel selected","Measurements noted"],
      "Material": ["Steel cut","Handle material selected","Pins or hardware ready"],
      "Profiling": ["Profile established","Tang shaped","Forge work complete"],
      "Grinding": ["Primary bevels started","Plunge lines established","Pre-HT thickness checked"],
      "Heat Treat": ["Normalized","Hardened","Tempered"],
      "Handle": ["Scales fitted","Glue-up complete","Handle shaped"],
      "Finish": ["Final sanding done","Edge sharpened","Final oil or wax applied"],
      "Complete": ["Photos taken","Delivered or stored"]
    };

    let projects = loadProjects();
    let selectedId = projects[0] ? projects[0].id : null;

    const els = {
      name: document.getElementById("name"),
      steel: document.getElementById("steel"),
      handle: document.getElementById("handle"),
      bladeType: document.getElementById("bladeType"),
      priority: document.getElementById("priority"),
      status: document.getElementById("status"),
      addBtn: document.getElementById("addBtn"),
      search: document.getElementById("search"),
      projectList: document.getElementById("projectList"),
      mainPane: document.getElementById("mainPane"),
      statProjects: document.getElementById("statProjects"),
      statHigh: document.getElementById("statHigh"),
      statDone: document.getElementById("statDone"),
      statActive: document.getElementById("statActive")
    };

    function uid() {
      return "p_" + Date.now() + "_" + Math.random().toString(36).slice(2,8);
    }

    function createProject(data) {
      const stageState = {};
      for (const stage of STAGES) {
        stageState[stage] = {
          notes: "",
          checklist: (CHECKLISTS[stage] || []).map(function(text){ return { text: text, done: false }; })
        };
      }
      return {
        id: uid(),
        name: data.name || "Untitled Knife",
        steel: data.steel || "",
        handle: data.handle || "",
        bladeType: data.bladeType || "",
        priority: data.priority || "Normal",
        status: data.status || "Active",
        currentStage: "Design",
        shopNotes: "",
        stageState: stageState
      };
    }

    function seedIfEmpty() {
      if (projects.length) return;
      const a = createProject({
        name: "Walnut Chef Knife",
        steel: "80CrV2",
        handle: "Walnut / brass pins",
        bladeType: "8-inch chef",
        priority: "High",
        status: "Active"
      });
      a.currentStage = "Grinding";
      a.stageState["Design"].checklist.forEach(function(i){ i.done = true; });
      a.stageState["Material"].checklist.forEach(function(i){ i.done = true; });
      a.stageState["Profiling"].checklist.forEach(function(i){ i.done = true; });

      const b = createProject({
        name: "Micarta Camp Knife",
        steel: "AEB-L",
        handle: "Black micarta",
        bladeType: "Camp utility",
        priority: "Normal",
        status: "Waiting"
      });
      b.currentStage = "Handle";
      projects = [a, b];
      selectedId = a.id;
      saveProjects();
    }

    function loadProjects() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return [];
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed : [];
      } catch (e) {
        return [];
      }
    }

    function saveProjects() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(projects));
    }

    function selectedProject() {
      for (let i = 0; i < projects.length; i++) {
        if (projects[i].id === selectedId) return projects[i];
      }
      return null;
    }

    function progress(project) {
      let done = 0;
      let total = 0;
      STAGES.forEach(function(stage){
        const items = (project.stageState[stage] && project.stageState[stage].checklist) || [];
        total += items.length;
        done += items.filter(function(x){ return x.done; }).length;
      });
      return total ? Math.round((done / total) * 100) : 0;
    }

    function escapeHtml(str) {
      return String(str == null ? "" : str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function updateStats() {
      els.statProjects.textContent = String(projects.length);
      els.statHigh.textContent = String(projects.filter(function(p){ return p.priority === "High"; }).length);
      els.statDone.textContent = String(projects.filter(function(p){ return p.status === "Complete"; }).length);
      const sp = selectedProject();
      els.statActive.textContent = sp ? sp.currentStage : "—";
    }

    function renderList() {
      const q = els.search.value.trim().toLowerCase();
      const filtered = projects.filter(function(p){
        const text = [p.name, p.steel, p.handle, p.bladeType, p.status, p.priority].join(" ").toLowerCase();
        return text.indexOf(q) !== -1;
      });

      if (!filtered.length) {
        els.projectList.innerHTML = '<div class="empty">No matching projects.</div>';
        return;
      }

      els.projectList.innerHTML = filtered.map(function(p){
        return '<div class="project-item ' + (p.id === selectedId ? 'active' : '') + '" data-project-id="' + escapeHtml(p.id) + '">' +
          '<div class="project-top">' +
            '<div>' +
              '<div class="project-name">' + escapeHtml(p.name) + '</div>' +
              '<div class="small">' + escapeHtml(p.bladeType || "Blade type not set") + '</div>' +
            '</div>' +
            '<div class="badge ' + (p.priority === "High" ? 'high' : (p.status === "Complete" ? 'ok' : '')) + '">' + escapeHtml(p.priority) + '</div>' +
          '</div>' +
          '<div class="small">' + escapeHtml(p.steel || "-") + ' • ' + escapeHtml(p.currentStage) + '</div>' +
          '<div class="progress"><div class="bar" style="width:' + progress(p) + '%"></div></div>' +
          '<div class="small">' + progress(p) + '% complete</div>' +
        '</div>';
      }).join("");

      Array.prototype.forEach.call(document.querySelectorAll("[data-project-id]"), function(el){
        el.addEventListener("click", function(){
          selectedId = el.getAttribute("data-project-id");
          render();
        });
      });
    }

    function renderMain() {
      const p = selectedProject();
      if (!p) {
        els.mainPane.innerHTML = '<div class="empty">Create a project or pick one from the list.</div>';
        return;
      }

      let html = '';
      html += '<div class="main-header">';
      html += '<div>';
      html += '<div class="main-title">' + escapeHtml(p.name) + '</div>';
      html += '<div class="muted">' + escapeHtml(p.bladeType || "Blade type not set") + ' • ' + escapeHtml(p.steel || "Steel not set") + ' • ' + escapeHtml(p.handle || "Handle not set") + '</div>';
      html += '<div class="pills">';
      html += '<span class="badge">' + escapeHtml(p.status) + '</span>';
      html += '<span class="badge ' + (p.priority === "High" ? "high" : "") + '">' + escapeHtml(p.priority) + '</span>';
      html += '<span class="badge">' + escapeHtml(p.currentStage) + '</span>';
      html += '</div></div>';
      html += '<div style="min-width:140px;"><div class="small">Overall progress</div><div style="font-size:22px;font-weight:700;">' + progress(p) + '%</div></div>';
      html += '</div>';

      html += '<div class="row3">';
      html += '<input id="editBladeType" class="field" placeholder="Blade type" value="' + escapeHtml(p.bladeType) + '">';
      html += '<input id="editSteel" class="field" placeholder="Steel" value="' + escapeHtml(p.steel) + '">';
      html += '<input id="editHandle" class="field" placeholder="Handle" value="' + escapeHtml(p.handle) + '">';
      html += '</div>';

      html += '<div class="row" style="margin-top:8px;">';
      html += '<select id="editPriority" class="select">' +
        ["High","Normal","Low"].map(function(v){ return '<option value="' + v + '" ' + (p.priority===v ? "selected" : "") + '>' + v + ' priority</option>'; }).join("") +
      '</select>';
      html += '<select id="editStatus" class="select">' +
        ["Active","On Hold","Waiting","Complete"].map(function(v){ return '<option value="' + v + '" ' + (p.status===v ? "selected" : "") + '>' + v + '</option>'; }).join("") +
      '</select>';
      html += '</div>';

      html += '<div class="section-title" style="margin-top:16px;">Shop Notes</div>';
      html += '<textarea id="shopNotes" class="textarea" placeholder="Overall project notes, reminders, customer asks...">' + escapeHtml(p.shopNotes || "") + '</textarea>';

      html += '<div class="section-title" style="margin-top:16px;">Stages</div>';
      html += '<div class="stage-grid">';
      STAGES.forEach(function(stage){
        const current = p.currentStage === stage;
        const s = p.stageState[stage];
        const stageProgress = s.checklist.length ? Math.round((s.checklist.filter(function(x){ return x.done; }).length / s.checklist.length) * 100) : 0;
        html += '<div class="stage-card ' + (current ? 'current' : '') + '">';
        html += '<div class="stage-head">';
        html += '<div class="stage-name">' + escapeHtml(stage) + '</div>';
        html += '<button class="btn ghost set-stage-btn" type="button" data-stage="' + escapeHtml(stage) + '">' + (current ? 'Current' : 'Make Current') + '</button>';
        html += '</div>';
        html += '<div class="small">' + stageProgress + '% of this stage done</div>';
        s.checklist.forEach(function(item, idx){
          html += '<label class="check">';
          html += '<input type="checkbox" class="check-toggle" data-stage="' + escapeHtml(stage) + '" data-idx="' + idx + '" ' + (item.done ? 'checked' : '') + '>';
          html += '<span>' + escapeHtml(item.text) + '</span>';
          html += '</label>';
        });
        html += '<textarea class="textarea stage-note" data-stage="' + escapeHtml(stage) + '" placeholder="Notes for ' + escapeHtml(stage) + '...">' + escapeHtml(s.notes || "") + '</textarea>';
        html += '</div>';
      });
      html += '</div>';

      html += '<div class="actions">';
      html += '<button id="saveMetaBtn" class="btn primary" type="button">Save Details</button>';
      html += '<button id="exportBtn" class="btn" type="button">Export Backup</button>';
      html += '<button id="deleteBtn" class="btn danger" type="button">Delete Project</button>';
      html += '</div>';
      html += '<div class="footer-note">Everything saves locally on this device. Export a backup once in a while so future-you has fewer reasons to swear.</div>';

      els.mainPane.innerHTML = html;

      document.getElementById("saveMetaBtn").addEventListener("click", function(){
        const sp = selectedProject();
        if (!sp) return;
        sp.bladeType = document.getElementById("editBladeType").value.trim();
        sp.steel = document.getElementById("editSteel").value.trim();
        sp.handle = document.getElementById("editHandle").value.trim();
        sp.priority = document.getElementById("editPriority").value;
        sp.status = document.getElementById("editStatus").value;
        sp.shopNotes = document.getElementById("shopNotes").value;
        saveProjects();
        render();
      });

      document.getElementById("deleteBtn").addEventListener("click", function(){
        const sp = selectedProject();
        if (!sp) return;
        projects = projects.filter(function(x){ return x.id !== sp.id; });
        selectedId = projects[0] ? projects[0].id : null;
        saveProjects();
        render();
      });

      document.getElementById("exportBtn").addEventListener("click", exportBackup);

      Array.prototype.forEach.call(document.querySelectorAll(".set-stage-btn"), function(btn){
        btn.addEventListener("click", function(){
          const sp = selectedProject();
          if (!sp) return;
          sp.currentStage = btn.getAttribute("data-stage");
          saveProjects();
          render();
        });
      });

      Array.prototype.forEach.call(document.querySelectorAll(".check-toggle"), function(box){
        box.addEventListener("change", function(){
          const sp = selectedProject();
          if (!sp) return;
          const stage = box.getAttribute("data-stage");
          const idx = Number(box.getAttribute("data-idx"));
          sp.stageState[stage].checklist[idx].done = box.checked;
          saveProjects();
          updateStats();
          renderList();
        });
      });

      Array.prototype.forEach.call(document.querySelectorAll(".stage-note"), function(area){
        area.addEventListener("input", function(){
          const sp = selectedProject();
          if (!sp) return;
          sp.stageState[area.getAttribute("data-stage")].notes = area.value;
          saveProjects();
        });
      });
    }

    function exportBackup() {
      const blob = new Blob([JSON.stringify(projects, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "knife-shop-tracker-backup.json";
      a.click();
      URL.revokeObjectURL(url);
    }

    function addProject() {
      const name = els.name.value.trim();
      if (!name) {
        alert("Give the project a name first.");
        return;
      }

      const p = createProject({
        name: name,
        steel: els.steel.value.trim(),
        handle: els.handle.value.trim(),
        bladeType: els.bladeType.value.trim(),
        priority: els.priority.value,
        status: els.status.value
      });

      projects.unshift(p);
      selectedId = p.id;
      saveProjects();

      els.name.value = "";
      els.steel.value = "";
      els.handle.value = "";
      els.bladeType.value = "";
      els.priority.value = "Normal";
      els.status.value = "Active";

      render();
    }

    function render() {
      updateStats();
      renderList();
      renderMain();
    }

    els.addBtn.addEventListener("click", addProject);
    els.search.addEventListener("input", renderList);

    seedIfEmpty();
    render();
  </script>
</body>
</html>
